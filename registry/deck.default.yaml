version: 1
enforcement:
  claude_hooks: true
  git_hooks: false
  # List branches here (e.g. [main]) to block direct commits/merges/pushes to
  # them and require pull requests. Left empty by default — opt in per project.
  protected_branches: []
pull_requests:
  require_audit: true       # the default deck has pre-PR audits; state it in the core
  agent_may_merge: false    # granting an agent merge authority is a per-team choice
cards:
  - id: hermit
  - id: justice
  - id: hierophant
  - id: temperance
  - id: strength
  - id: devil
  - id: hanged-man
rites:
  - id: migration
  - id: bugfix
  - id: refactor
  - id: dependency
bindings:
  conduct:
    - text: "Never commit credentials, tokens, or secrets — not in code, config, tests, or fixtures."
      critical: true
    - text: "Never force-push or rewrite history on a shared branch."
      critical: true
    - text: "Never disable, skip, or delete a failing test to make a build pass — fix it or surface it."
    - text: "All changes to a public API are versioned and documented."
    - text: "Destructive operations (dropping data, deleting branches, bulk rewrites) require explicit confirmation first."
    - text: "Do all work on a feature branch; never commit directly to the main branch."
      critical: true
    - text: "Land changes on main only through a reviewed pull request; never merge or push to it directly."
      critical: true
